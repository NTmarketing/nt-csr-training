# NT CSR Training Portal — Nginx site config.
# Install path: /etc/nginx/sites-available/nt-csr-training
# Symlinked to:  /etc/nginx/sites-enabled/nt-csr-training
#
# This file is the pre-SSL version. After certbot --nginx runs, certbot will
# inject the SSL cert paths and wire up the HTTPS server block automatically.
# The pre-SSL HTTP server block below is sufficient for certbot to issue the
# cert via HTTP-01 challenge.
#
# Frontend is served as static files from frontend/dist/.
# Backend listens on localhost:3100; nginx proxies /api/* to it.

server {
    listen 80;
    listen [::]:80;
    server_name nt-csr-training.duckdns.org;

    # Frontend static files (Vite build output)
    location / {
        root /opt/nt-csr-training/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api {
        proxy_pass http://localhost:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass_request_headers on;
        proxy_read_timeout 120s;
    }

    # Reasonable defaults
    client_max_body_size 10M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

# After certbot runs:
#   - Certbot adds an HTTPS server block on 443 with the cert paths
#   - Certbot adds a 301 redirect from HTTP → HTTPS in the block above
# Both are handled automatically by `certbot --nginx`.
